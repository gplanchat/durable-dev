# Voir DUR009 (pyramide de tests), DUR008 (normes de code PHP-FIG).
name: CI

on:
    push:
        branches: [main, master]
    pull_request:

jobs:
    qa:
        name: QA (CS + tests)
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                php-version: ['8.2', '8.3', '8.4', '8.5']
        steps:
            - uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php-version }}
                  # ext-grpc : requis pour WorkflowTaskRunner, WorkflowTaskProcessor et TemporalHistoryCursor (DUR027).
                  extensions: mbstring, sqlite3, pdo_sqlite, grpc
                  coverage: none

            - name: Install Composer dependencies
              run: composer install --no-interaction --prefer-dist --no-progress

            - name: PHP-CS-Fixer (dry-run)
              run: composer cs:check

            - name: PHPUnit
              run: composer test

    static-analysis:
        name: Analyse statique (PHPStan + Psalm)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  extensions: mbstring, sqlite3, pdo_sqlite
                  coverage: none

            - name: Install Composer dependencies
              run: composer install --no-interaction --prefer-dist --no-progress

            - name: Versions outils (composer.lock)
              run: |
                composer show phpstan/phpstan --no-ansi | head -n 5
                composer show vimeo/psalm --no-ansi | head -n 5
                php vendor/bin/phpstan --version
                php vendor/bin/psalm --version

            - name: PHPStan (src/, tests/)
              run: composer phpstan

            - name: Psalm (src/, tests/)
              run: composer psalm

    symfony-sample:
        name: App exemple Symfony (composer + PHPUnit)
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                php-version: ['8.2', '8.3', '8.4', '8.5']
        steps:
            - uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php-version }}
                  extensions: mbstring, sqlite3, pdo_sqlite
                  coverage: none

            - name: Composer install (symfony/)
              working-directory: symfony
              run: composer install --no-interaction --prefer-dist --no-progress

            - name: PHPUnit (symfony/)
              working-directory: symfony
              run: composer test

    temporal-bridge:
        name: Bridge Temporal (ext-grpc + test resolver)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  extensions: mbstring, sqlite3, pdo_sqlite, grpc
                  coverage: none

            - name: Install Composer dependencies
              run: composer install --no-interaction --prefer-dist --no-progress

            - name: PHPUnit (journal history replay)
              run: vendor/bin/phpunit tests/unit/Bridge/Temporal/JournalStateResolverTest.php

            - name: PHPUnit (Temporal transport factory, ext-grpc)
              run: vendor/bin/phpunit tests/unit/Bridge/Temporal/Messenger/TemporalTransportFactoryTest.php

            - name: PHPUnit (WorkflowTaskRunner + WorkflowTaskProcessor — fiber replay, DUR027)
              run: vendor/bin/phpunit tests/unit/Bridge/Temporal/Worker/

    coverage:
        name: Couverture (PCOV)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup PHP with PCOV
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  extensions: mbstring, sqlite3, pdo_sqlite, grpc
                  coverage: pcov
                  ini-values: pcov.directory=.

            - name: Install Composer dependencies
              run: composer install --no-interaction --prefer-dist --no-progress

            - name: Rapport texte (src/)
              run: composer test:coverage

    temporal-integration:
        name: Tests d'intégration Temporal (gRPC + Temporal auto-setup)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup PHP (ext-grpc requis)
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  extensions: mbstring, sqlite3, pdo_sqlite, grpc
                  coverage: none

            - name: Installer les dépendances Composer (symfony/)
              working-directory: symfony
              run: composer install --no-interaction --prefer-dist --no-progress

            - name: Démarrer PostgreSQL + Temporal (symfony/compose.yaml)
              working-directory: symfony
              run: docker compose up -d --wait --wait-timeout 300 database temporal

            - name: PHPUnit — tests d'intégration Temporal (temporal-integration + temporal-native-spike)
              working-directory: symfony
              env:
                  DURABLE_DSN: 'temporal://127.0.0.1:7233?namespace=default&journal_task_queue=durable-journal&activity_task_queue=durable-activities&tls=0'
              run: |
                  php bin/phpunit \
                    --group temporal-integration,temporal-native-spike \
                    --testdox \
                    tests/Integration/Temporal/

            - name: Arrêt des conteneurs
              if: always()
              working-directory: symfony
              run: docker compose down -v

    docker-compose-stack:
        name: Stack Docker (Temporal + UI)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Valider compose.yaml
              run: docker compose -f symfony/compose.yaml config --quiet

            - name: Démarrer PostgreSQL + Temporal + UI
              run: docker compose -f symfony/compose.yaml up -d --wait --wait-timeout 180 database temporal temporal-ui

            - name: Vérifier Temporal UI (exec interne)
              run: |
                  set -e
                  for i in $(seq 1 20); do
                    if docker compose -f symfony/compose.yaml exec -T temporal-ui wget -qO- http://localhost:8080/ > /dev/null 2>&1; then
                      echo "Temporal UI OK (tentative $i)"
                      exit 0
                    fi
                    sleep 5
                  done
                  docker compose -f symfony/compose.yaml logs temporal-ui --tail 40
                  exit 1

            - name: Arrêt des conteneurs
              if: always()
              run: docker compose -f symfony/compose.yaml down -v
