# Déploie le site Hugo (hugo-docs/) sur GitHub Pages via Actions.
# Prérequis dépôt : Settings → Pages → Build and deployment → Source : GitHub Actions.
name: Deploy Hugo to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'hugo-docs/**'
      - 'documentation/INDEX.md'
      - '.github/workflows/hugo-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-hugo
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.159.1'
          extended: true

      - name: Sync architecture pages from INDEX.md
        run: python3 hugo-docs/scripts/sync_architecture_from_index.py

      - name: Build
        working-directory: hugo-docs
        run: hugo --minify --gc

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: hugo-docs/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
