# Runs splitsh-lite per prefix (monorepo → mirror commits for satellite repos).
# Full Git history required; see bin/splitsh-publish.sh, DUR020, README (split / Packagist).
# Optional secret SPLITSH_PUSH_TOKEN (PAT) for HTTPS git push to each satellite repo.
#
# splitsh/lite v2.0.0 uses git2go v34 → libgit2 **1.5.x** only. The runner's `libgit2-dev`
# package (often 1.7+) is incompatible → build libgit2 v1.5.2 under $HOME.
# Do not use ${{ runner.home }} — use $HOME / ~.
name: Splitsh

on:
    push:
        branches: [main, master]
    workflow_dispatch:

concurrency:
    group: splitsh-${{ github.ref }}
    cancel-in-progress: true

jobs:
    splitsh:
        name: splitsh-lite (sous-arborescences)
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout (historique complet — requis par splitsh)
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Répertoire binaire local
              run: mkdir -p "$HOME/.local/bin"

            - name: Restaurer le cache (splitsh-lite + libgit2 1.5)
              id: cache-toolchain
              uses: actions/cache/restore@v4
              with:
                  path: |
                      ~/.local/bin/splitsh-lite
                      ~/libgit2-install
                  key: splitsh-toolchain-v2-libgit2-1.5.2-${{ runner.os }}-amd64

            - name: Paquets système (build libgit2, pas libgit2-dev)
              if: steps.cache-toolchain.outputs.cache-hit != 'true'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y build-essential cmake curl libssl-dev pkg-config zlib1g-dev

            - uses: actions/setup-go@v5
              if: steps.cache-toolchain.outputs.cache-hit != 'true'
              with:
                  go-version: '1.22'

            - name: Compiler libgit2 1.5.2 puis splitsh-lite (splitsh/lite v2.0.0)
              if: steps.cache-toolchain.outputs.cache-hit != 'true'
              env:
                  SPLITSH_LITE_REF: v2.0.0
              run: |
                  set -euo pipefail
                  PREFIX="$HOME/libgit2-install"
                  mkdir -p "$PREFIX"
                  curl -sL https://github.com/libgit2/libgit2/archive/refs/tags/v1.5.2.tar.gz | tar xz -C /tmp
                  cd /tmp/libgit2-1.5.2
                  cmake -S . -B build \
                    -DCMAKE_BUILD_TYPE=Release \
                    -DCMAKE_INSTALL_PREFIX="$PREFIX" \
                    -DBUILD_CLAR=OFF \
                    -DBUILD_TESTS=OFF \
                    -DUSE_SSH=OFF
                  cmake --build build --parallel
                  cmake --install build
                  export PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig"
                  export LD_LIBRARY_PATH="$PREFIX/lib:${LD_LIBRARY_PATH:-}"
                  pkg-config --print-errors --exists libgit2
                  pkg-config --modversion libgit2
                  git clone --depth 1 --branch "${SPLITSH_LITE_REF}" https://github.com/splitsh/lite.git /tmp/splitsh-lite-src
                  (cd /tmp/splitsh-lite-src && CGO_ENABLED=1 go build -o splitsh-lite .)
                  install -m 0755 /tmp/splitsh-lite-src/splitsh-lite "$HOME/.local/bin/splitsh-lite"

            - name: LD_LIBRARY_PATH (binaire lié à libgit2 du préfixe)
              run: |
                  if [ -d "$HOME/libgit2-install/lib" ]; then
                    echo "LD_LIBRARY_PATH=$HOME/libgit2-install/lib" >> "$GITHUB_ENV"
                  fi

            - name: PATH
              run: echo "$HOME/.local/bin" >> "${GITHUB_PATH}"

            - name: Vérifier splitsh-lite
              run: command -v splitsh-lite && test -x "$HOME/.local/bin/splitsh-lite"

            - name: Extraire les sous-arbres (et pousser si SPLITSH_PUSH_TOKEN)
              env:
                  SPLITSH_PUSH_TOKEN: ${{ secrets.SPLITSH_PUSH_TOKEN }}
              run: ./bin/splitsh-publish.sh

            - name: Sauvegarder le cache (splitsh-lite + libgit2)
              if: success() && steps.cache-toolchain.outputs.cache-hit != 'true'
              uses: actions/cache/save@v4
              with:
                  path: |
                      ~/.local/bin/splitsh-lite
                      ~/libgit2-install
                  key: splitsh-toolchain-v2-libgit2-1.5.2-${{ runner.os }}-amd64
