# Journal : EventStore in-memory + bridge Temporal (WorkflowTaskRunner/WorkflowTaskProcessor) si durable.temporal.dsn est défini.
# Pas de persistance SQL pour le journal.
durable:
    event_store:
        type: in_memory
    temporal:
        dsn: null
    workflow_metadata:
        type: in_memory
    activity_transport:
        type: messenger
        transport_name: durable_activities
    child_workflow:
        async_messenger: true
        parent_link_store:
            type: in_memory
    activity_contracts:
        cache: cache.app
        contracts:
            - App\Durable\Activity\GreetingActivityInterface
            - App\Durable\Activity\EchoActivityInterface
            - App\Durable\Activity\TickActivityInterface

when@dev:
    durable:
        event_store:
            type: in_memory
        temporal:
            dsn: '%env(DURABLE_DSN)%'
        workflow_metadata:
            type: in_memory
        child_workflow:
            async_messenger: true
            parent_link_store:
                type: in_memory

when@prod:
    durable:
        event_store:
            type: in_memory
        temporal:
            dsn: '%env(DURABLE_DSN)%'
        workflow_metadata:
            type: in_memory
        child_workflow:
            async_messenger: true
            parent_link_store:
                type: in_memory

when@test:
    durable:
        event_store:
            type: in_memory
        temporal:
            dsn: null
        workflow_metadata:
            type: in_memory
        child_workflow:
            async_messenger: false
            parent_link_store:
                type: in_memory
