framework:
    messenger:
        failure_transport: failed
        transports:
            sync: 'sync://'
            failed: 'doctrine://default?queue_name=failed&auto_setup=true'
            durable_workflows: '%env(MESSENGER_DURABLE_WORKFLOW_DSN)%'
            durable_activities: '%env(MESSENGER_DURABLE_ACTIVITY_DSN)%'

        routing:
            Gplanchat\Durable\Transport\WorkflowRunMessage: durable_workflows
            Gplanchat\Durable\Transport\ActivityMessage: durable_activities
            Gplanchat\Durable\Transport\FireWorkflowTimersMessage: sync
            Gplanchat\Durable\Transport\DeliverWorkflowSignalMessage: sync
            Gplanchat\Durable\Transport\DeliverWorkflowUpdateMessage: sync

# En dev : MESSENGER_DURABLE_* dans .env.dev → temporal://…?inner=doctrine://… (durable-bridge-temporal).
# Poll du journal Temporal (receive-only, sans inner) : messenger:consume durable_temporal_journal (DURABLE_TEMPORAL_DSN).
# Sinon défaut doctrine:// dans parameters (doctrine.yaml). Tests : in-memory (when@test).
when@dev:
    framework:
        messenger:
            transports:
                durable_temporal_journal: '%env(DURABLE_TEMPORAL_DSN)%'
            routing:
                # DelayStamp pris en charge par Doctrine ; évite le spam sync lors des pauses timer longues.
                Gplanchat\Durable\Transport\FireWorkflowTimersMessage: durable_workflows

when@test:
    framework:
        messenger:
            transports:
                durable_workflows: 'in-memory://'
                durable_activities: 'in-memory://'
                failed: 'in-memory://'
