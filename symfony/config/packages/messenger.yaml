parameters:
    # Test (APP_ENV=test) : in-memory forcé via when@test. Dev/prod : DURABLE_DSN + transports ci-dessous (même DSN, purpose différent).
    env(MESSENGER_DURABLE_WORKFLOW_DSN): 'in-memory://'
    env(MESSENGER_DURABLE_ACTIVITY_DSN): 'in-memory://'
    # Défaut aligné sur symfony/.env (TEMPORAL_FRONTEND_PORT=7234 dans compose) — éviter 7233 si le port hôte diffère.
    env(DURABLE_DSN): 'temporal://127.0.0.1:7234?namespace=default&journal_task_queue=durable-journal&activity_task_queue=durable-activities&tls=0'

framework:
    messenger:
        failure_transport: failed
        transports:
            sync: 'sync://'
            failed: 'in-memory://'
            durable_workflows: '%env(MESSENGER_DURABLE_WORKFLOW_DSN)%'
            durable_activities: '%env(MESSENGER_DURABLE_ACTIVITY_DSN)%'

        routing:
            Gplanchat\Durable\Transport\ResumeWorkflowMessage: durable_workflows
            Gplanchat\Durable\Transport\ActivityMessage: durable_activities
            Gplanchat\Durable\Transport\FireWorkflowTimersMessage: sync
            Gplanchat\Durable\Transport\DeliverWorkflowSignalMessage: sync
            Gplanchat\Durable\Transport\DeliverWorkflowUpdateMessage: sync

when@dev:
    framework:
        messenger:
            transports:
                # DSN peut omettre interpreter_mirror=1 : le bundle injecte durable.temporal.connection (identique à l’EventStore).
                durable_temporal_journal:
                    dsn: '%env(DURABLE_DSN)%'
                durable_temporal_activity:
                    dsn: '%env(DURABLE_DSN)%'
                    options:
                        purpose: activity_worker
            routing:
                Gplanchat\Durable\Transport\FireWorkflowTimersMessage: durable_workflows

when@prod:
    framework:
        messenger:
            transports:
                # Même remarque que dev : connexion effective via durable.temporal.connection (bundle).
                durable_temporal_journal:
                    dsn: '%env(DURABLE_DSN)%'
                durable_temporal_activity:
                    dsn: '%env(DURABLE_DSN)%'
                    options:
                        purpose: activity_worker
            routing:
                Gplanchat\Durable\Transport\FireWorkflowTimersMessage: durable_workflows

when@test:
    framework:
        messenger:
            transports:
                durable_workflows: 'in-memory://'
                durable_activities: 'in-memory://'
                failed: 'in-memory://'
            routing:
                # Comme dev/prod : les réveils timer portent DelayStamp ; sync:// les exécute tout de suite
                # et ignore le délai — les workflows sample (Query 2s, Periodic 0.2s) ne terminent jamais.
                Gplanchat\Durable\Transport\FireWorkflowTimersMessage: durable_workflows
