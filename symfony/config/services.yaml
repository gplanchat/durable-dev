# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # Tag workflows for auto-registration (voir aussi #[AsDurableActivity] sur les handlers)
    App\Durable\Workflow\:
        resource: '../src/Durable/Workflow/'
        tags: [durable.workflow]

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

# Journal Durable sur Temporal (workflows « DurableJournal » visibles dans Temporal UI).
# Prérequis : ext-grpc, stack `docker compose` dans ./symfony/, worker messenger:consume durable_temporal_journal.
# Les files Messenger applicatives (inner doctrine) restent en base SQLite/Doctrine — pas d’activités Temporal natives tant que le transport gRPC applicatif n’est pas implémenté.
when@dev:
    services:
        temporal.connection:
            class: Gplanchat\Bridge\Temporal\TemporalConnection
            factory: ['Gplanchat\Bridge\Temporal\TemporalConnection', 'fromDsn']
            arguments: ['%env(DURABLE_TEMPORAL_DSN)%']

        temporal.workflow_service_client:
            class: Temporal\Api\Workflowservice\V1\WorkflowServiceClient
            factory: ['Gplanchat\Bridge\Temporal\WorkflowServiceClientFactory', 'create']
            arguments: ['@temporal.connection']

        Gplanchat\Durable\Store\EventStoreInterface:
            class: Gplanchat\Bridge\Temporal\TemporalJournalEventStore
            public: true
            arguments:
                $client: '@temporal.workflow_service_client'
                $settings: '@temporal.connection'
