# Symfony CLI : lance des workers en parallèle avec `symfony serve` (depuis ce dossier).
# - durable_temporal_journal : poll gRPC du journal Temporal (receive-only, DURABLE_TEMPORAL_DSN).
# - durable_temporal_activity : poll activités Temporal (TemporalActivityWorker → ActivityMessageProcessor).
# - durable_workflows / durable_activities : files applicatives (inner Doctrine).
#
# Prérequis : APP_ENV=dev, ext-grpc, `docker compose up -d`, DURABLE_TEMPORAL_DSN + MESSENGER_DURABLE_* dans .env.dev.

workers:
    durable_temporal_journal_1:
        cmd: ['symfony', 'console', 'messenger:consume', 'durable_temporal_journal', '-vv']
        watch: ['config', 'src', 'templates', 'vendor/composer/installed.json']
    durable_temporal_journal_2:
        cmd: ['symfony', 'console', 'messenger:consume', 'durable_temporal_journal', '-vv']
        watch: ['config', 'src', 'templates', 'vendor/composer/installed.json']
    durable_temporal_activity_1:
        cmd: ['symfony', 'console', 'messenger:consume', 'durable_temporal_activity', '-vv']
        watch: ['config', 'src', 'templates', 'vendor/composer/installed.json']
    durable_temporal_activity_2:
        cmd: ['symfony', 'console', 'messenger:consume', 'durable_temporal_activity', '-vv']
        watch: ['config', 'src', 'templates', 'vendor/composer/installed.json']
    durable_workflows_1:
        cmd: ['symfony', 'console', 'messenger:consume', 'durable_workflows', '-vv']
        watch: ['config', 'src', 'templates', 'vendor/composer/installed.json']
    durable_workflows_2:
        cmd: ['symfony', 'console', 'messenger:consume', 'durable_workflows', '-vv']
        watch: ['config', 'src', 'templates', 'vendor/composer/installed.json']
    durable_activities_1:
        cmd: ['symfony', 'console', 'messenger:consume', 'durable_activities', '-vv']
        watch: ['config', 'src', 'templates', 'vendor/composer/installed.json']
    durable_activities_2:
        cmd: ['symfony', 'console', 'messenger:consume', 'durable_activities', '-vv']
        watch: ['config', 'src', 'templates', 'vendor/composer/installed.json']
    docker_compose:
        cmd: ['docker', 'compose', 'up']
        watch: ['compose.yaml', 'compose.override.yaml', 'docker-compose.yaml', 'docker-compose.override.yaml']